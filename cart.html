<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shopping Cart</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
  <div class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow">
    <div class="flex justify-between items-center mb-6 border-b pb-4">
      <h1 class="text-2xl font-bold">Shopping Cart 🛒</h1>
      <a href="products.html" class="text-blue-500 hover:underline">Continue Shopping</a>
    </div>

    <div id="cart-table-container" class="space-y-4">
      </div>

    <div class="mt-6 border-t pt-4 flex flex-col sm:flex-row justify-between items-center gap-4">
      <button onclick="clearCart()" class="text-red-500 border border-red-500 px-4 py-2 rounded hover:bg-red-50 transition">Clear Cart</button>
      <div class="text-right">
        <span class="text-gray-600 text-lg">Grand Total:</span>
        <span id="cart-grand-total" class="text-2xl font-bold text-gray-900 ml-2">P0.00</span>
        <div class="mt-4">
          <a href="checkout.html" class="bg-green-600 text-white px-6 py-3 rounded-lg font-bold hover:bg-green-700 block text-center shadow">Proceed to Checkout</a>
        </div>
      </div>
    </div>
  </div>

  <script src="js/products.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>
