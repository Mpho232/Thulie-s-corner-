<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4 md:p-8">
  <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
    <div class="md:col-span-2 bg-white p-6 rounded-xl shadow">
      <h2 class="text-xl font-bold mb-4 border-b pb-2">Delivery & Payment Information</h2>
      <form id="checkout-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium">Customer Name</label>
          <input type="text" id="cust-name" required class="w-full border p-2 rounded mt-1">
        </div>
        <div>
          <label class="block text-sm font-medium">Phone Number</label>
          <input type="tel" id="cust-phone" required class="w-full border p-2 rounded mt-1">
        </div>
        <div>
          <label class="block text-sm font-medium">Delivery Address</label>
          <textarea id="cust-address" required class="w-full border p-2 rounded mt-1 rows="3"></textarea>
        </div>
        <div>
          <label class="block text-sm font-medium">Delivery Option</label>
          <select id="delivery-option" class="w-full border p-2 rounded mt-1">
            <option value="Standard" data-cost="30">Standard Delivery (P30)</option>
            <option value="Express" data-cost="75">Express Delivery (P75)</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium">Payment Method</label>
          <select id="payment-method" class="w-full border p-2 rounded mt-1">
            <option value="Cash on Delivery">Cash on Delivery</option>
            <option value="Orange Money">Orange Money</option>
            <option value="MyZaka">MyZaka</option>
            <option value="Bank Transfer">Bank Transfer</option>
          </select>
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 transition shadow">
          Place Order
        </button>
      </form>
    </div>

    <div class="bg-white p-6 rounded-xl shadow h-fit">
      <h2 class="text-xl font-bold mb-4 border-b pb-2">Order Summary</h2>
      <div id="summary-items" class="space-y-2 border-b pb-4 mb-4 text-sm">
        </div>
      <div class="space-y-2 text-sm font-medium">
        <div class="flex justify-between"><span>Items Subtotal:</span><span id="subtotal-val">P0</span></div>
        <div class="flex justify-between"><span>Delivery Cost:</span><span id="delivery-val">P0</span></div>
        <div class="flex justify-between text-base font-bold border-t pt-2 mt-2">
          <span>Total Cost:</span><span id="grand-total-val" class="text-blue-600">P0</span>
        </div>
      </div>
    </div>
  </div>

  <script src="js/products.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
